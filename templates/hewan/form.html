{% extends "base.html" %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <!-- Header -->
            <div class="mb-4">
                <h3 style="color: var(--sidebar-bg); font-weight: 600;">
                    <i class="fas fa-plus-square"></i> {{ title }}
                </h3>
            </div>
            
            <!-- Form Card -->
            <div class="card">
                <div class="card-body">
                    <form method="POST" novalidate>
                        
                        <!-- Pemilik -->
                        <div class="mb-3">
                            <label for="id_pemilik" class="form-label">
                                <strong>Pemilik Hewan *</strong>
                            </label>
                            <select class="form-select" id="id_pemilik" name="id_pemilik" required>
                                <option value="">-- Pilih Pemilik --</option>
                                {% for p in pemilik %}
                                    <option value="{{ p.id_pemilik }}" 
                                            {% if request.args.get('id_pemilik')|int == p.id_pemilik or (hewan and hewan.id_pemilik == p.id_pemilik) %}selected{% endif %}>
                                        {{ p.nama_pemilik }} ({{ p.no_telepon if p.no_telepon else 'Telp: -' }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Jenis Hewan -->
                        <div class="mb-3">
                            <label for="id_jenis" class="form-label">
                                <strong>Jenis Hewan *</strong>
                            </label>
                            <select class="form-select" id="id_jenis" name="id_jenis" required onchange="loadRas()">
                                <option value="">-- Pilih Jenis --</option>
                                {% for j in jenis %}
                                    <option value="{{ j.id_jenis }}" 
                                            {% if hewan and hewan.id_jenis == j.id_jenis %}selected{% endif %}>
                                        {{ j.nama_jenis }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Ras Hewan -->
                        <div class="mb-3">
                            <label for="id_ras" class="form-label">
                                <strong>Ras Hewan *</strong>
                            </label>
                            <select class="form-select" id="id_ras" name="id_ras" required>
                                <option value="">-- Pilih Ras --</option>
                                {% if hewan and hewan.ras %}
                                    <option value="{{ hewan.id_ras }}" selected>
                                        {{ hewan.ras.nama_ras }}
                                    </option>
                                {% endif %}
                            </select>
                        </div>
                        
                        <!-- Nama Hewan -->
                        <div class="mb-3">
                            <label for="nama_hewan" class="form-label">
                                <strong>Nama Hewan *</strong>
                            </label>
                            <input type="text" class="form-control" id="nama_hewan" 
                                   name="nama_hewan" placeholder="Masukkan nama hewan"
                                   value="{{ hewan.nama_hewan if hewan else '' }}" required>
                            <small class="text-muted">Contoh: Max, Mimi, Toto</small>
                        </div>
                        
                        <!-- Jenis Kelamin -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Jenis Kelamin *</strong></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="jenis_kelamin" 
                                       id="jantan" value="L" 
                                       {% if hewan and hewan.jenis_kelamin == 'L' %}checked{% endif %}>
                                <label class="form-check-label" for="jantan">
                                    <i class="fas fa-mars" style="color: #3498db;"></i> Jantan
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="jenis_kelamin" 
                                       id="betina" value="P" 
                                       {% if hewan and hewan.jenis_kelamin == 'P' %}checked{% endif %}>
                                <label class="form-check-label" for="betina">
                                    <i class="fas fa-venus" style="color: #e74c3c;"></i> Betina
                                </label>
                            </div>
                        </div>
                        
                        <!-- Tanggal Lahir -->
                        <div class="mb-3">
                            <label for="tanggal_lahir" class="form-label">
                                <i class="fas fa-calendar"></i> Tanggal Lahir
                            </label>
                            <input type="date" class="form-control" id="tanggal_lahir" 
                                   name="tanggal_lahir"
                                   value="{{ hewan.tanggal_lahir if hewan and hewan.tanggal_lahir else '' }}">
                            <small class="text-muted">Perkiraan tanggal lahir jika tidak tahu pasti</small>
                        </div>
                        
                        <!-- Berat -->
                        <div class="mb-3">
                            <label for="berat_kg" class="form-label">
                                <i class="fas fa-weight"></i> Berat (kg)
                            </label>
                            <input type="number" step="0.1" class="form-control" id="berat_kg" 
                                   name="berat_kg" placeholder="Contoh: 25.5"
                                   value="{{ hewan.berat_kg if hewan and hewan.berat_kg else '' }}">
                            <small class="text-muted">Contoh: 25.5 kg</small>
                        </div>
                        
                        <!-- Buttons -->
                        <div class="row mt-4">
                            <div class="col-md-6">
                                <a href="{{ url_for('list_hewan') }}" class="btn btn-secondary w-100">
                                    <i class="fas fa-arrow-left"></i> Kembali
                                </a>
                            </div>
                            <div class="col-md-6">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-save"></i> Simpan
                                </button>
                            </div>
                        </div>
                        
                    </form>
                </div>
            </div>
            
        </div>
    </div>
    
</div>
{% endblock %}

{% block extra_js %}
<script>
    function loadRas() {
        const idJenis = document.getElementById('id_jenis').value;
        if (!idJenis) return;
        
        fetch(`{{ url_for('get_ras_by_jenis', id_jenis=0) }}`.replace('0', idJenis))
            .then(response => response.json())
            .then(data => {
                const rasSelect = document.getElementById('id_ras');
                rasSelect.innerHTML = '<option value="">-- Pilih Ras --</option>';
                data.forEach(ras => {
                    rasSelect.innerHTML += `<option value="${ras.id_ras}">${ras.nama_ras}</option>`;
                });
            })
            .catch(error => console.error('Error:', error));
    }
    
    // Load ras on page load jika ada jenis dipilih
    window.addEventListener('load', function() {
        if (document.getElementById('id_jenis').value) {
            loadRas();
        }
    });
    
    // Form validation
    document.querySelector('form').addEventListener('submit', function(e) {
        const pemilik = document.getElementById('id_pemilik').value;
        const jenis = document.getElementById('id_jenis').value;
        const ras = document.getElementById('id_ras').value;
        const nama = document.getElementById('nama_hewan').value.trim();
        
        if (!pemilik) {
            e.preventDefault();
            alert('Pilih pemilik terlebih dahulu');
            return false;
        }
        
        if (!jenis) {
            e.preventDefault();
            alert('Pilih jenis hewan');
            return false;
        }
        
        if (!ras) {
            e.preventDefault();
            alert('Pilih ras hewan');
            return false;
        }
        
        if (!nama || nama.length < 2) {
            e.preventDefault();
            alert('Nama hewan harus diisi dan minimal 2 karakter');
            return false;
        }
    });
</script>
{% endblock %}
