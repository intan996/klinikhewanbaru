<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Sistem Informasi Klinik Hewan</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-container {
            width: 100%;
            max-width: 450px;
        }
        
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }
        
        .register-header h2 {
            margin: 0 0 5px 0;
            font-weight: 700;
            font-size: 28px;
        }
        
        .register-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
        
        .register-header i {
            font-size: 45px;
            margin-bottom: 10px;
        }
        
        .register-body {
            padding: 35px 30px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }
        
        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }
        
        .register-btn:active {
            transform: translateY(0);
        }
        
        .register-footer {
            padding: 20px 30px;
            background: #f9f9f9;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }
        
        .register-footer p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        
        .register-footer a {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .register-footer a:hover {
            color: #27ae60;
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }
        
        .alert-danger {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            padding: 12px 15px;
            font-size: 13px;
        }
        
        .alert-success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
            padding: 12px 15px;
            font-size: 13px;
        }
        
        .password-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        
        @media (max-width: 500px) {
            .register-body {
                padding: 25px 20px;
            }
            
            .register-header {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <i class="fas fa-user-plus"></i>
                <h2>Daftar Akun</h2>
                <p>Bergabunglah dengan sistem kami</p>
            </div>
            
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="padding: 20px 30px; padding-bottom: 0;">
                            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
                                {{ message }}
                            </div>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <div class="register-body">
                <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                    <div class="form-group">
                        <label for="nama_lengkap">
                            <i class="fas fa-id-card"></i> Nama Lengkap
                        </label>
                        <input type="text" id="nama_lengkap" name="nama_lengkap" placeholder="Masukkan nama lengkap Anda" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" id="username" name="username" placeholder="Pilih username unik" required minlength="3">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" id="email" name="email" placeholder="Masukkan email yang valid" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="password" name="password" placeholder="Minimal 6 karakter" required minlength="6">
                        <div class="password-hint">
                            <i class="fas fa-info-circle"></i> Password harus minimal 6 karakter
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">
                            <i class="fas fa-lock"></i> Konfirmasi Password
                        </label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Ulangi password Anda" required minlength="6">
                    </div>
                    
                    <button type="submit" class="register-btn">
                        <i class="fas fa-check-circle"></i> Daftar Sekarang
                    </button>
                </form>
            </div>
            
            <div class="register-footer">
                <p>Sudah punya akun? <a href="{{ url_for('login') }}">Masuk di sini</a></p>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Validate password match
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Password dan konfirmasi password tidak cocok!');
                document.getElementById('confirm_password').focus();
            }
        });
    </script>
</body>
</html>
